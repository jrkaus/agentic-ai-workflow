###############################################################################
# Workflow: Python Unit Tests
#
# Purpose:
#   Runs Python unit tests automatically on pull requests and pushes to main/next.
#
# Triggers:
#   - On push to main or next branches (Python files only)
#   - On pull requests affecting Python files
#   - Manual dispatch
#
# Key Steps:
#   1. Checkout repository code
#   2. Set up Python environment using a custom action
#   3. Run unit tests and report results
#
# Notes:
#   - secrets are set in https://github.com/smarter-sh/smarter/settings/secrets/actions
#   - Integrates with Codecov for coverage reporting
###############################################################################
name: Python Unit Tests

on:
  workflow_dispatch: # Allows the workflow to be manually triggered from the GitHub Actions tab
  pull_request: #
    paths: # Trigger workflow on pull requests, but
      - "**.py" # only if Python files are changed
  push:
    branches: #
      - main #
      - next # Trigger workflow on pushes to main and next
    paths: # branches, but only if Python files are changed
      - "**.py" #

env:
  python-version: "3.13"
  
Exception("Intentional Failure") 

jobs:
  # Job #1: Run Python unit tests
  #
  # This job will run on an Ubuntu runner and execute the Python
  # tests by using a custom action located in ./.github/actions/tests/python.
  python-unit-tests:
    runs-on: ubuntu-latest # the runner (remote machine) will use Ubuntu OS
    steps:
      - name: Checkout code
        id: checkout
        uses: actions/checkout@v6

      - name: Run Python tests
        uses: ./.github/actions/tests/python
        with:
          environment: "local"
          python-version: "${{ env.python-version}}"
          openai-api-organization: "${{ secrets.OPENAI_API_ORGANIZATION }}"
          openai-api-key: "${{ secrets.OPENAI_API_KEY }}"
          mysql-host: "${{ secrets.MYSQL_HOST }}"
          mysql-port: "${{ secrets.MYSQL_PORT }}"
          mysql-user: "${{ secrets.MYSQL_USER }}"
          mysql-password: "${{ secrets.MYSQL_PASSWORD }}"
          mysql-database: "${{ secrets.MYSQL_DATABASE }}"
          mysql-charset: "${{ secrets.MYSQL_CHARSET }}"
          codecov-token: "${{ secrets.CODECOV_TOKEN }}"

  # Job #2: Notifications (Mini-capstone assignment)
  # This job will run after the Python unit tests and
  # is scaffolded to facilitate sending notifications based
  # on the test results.
  # notifications:
  notifications:
    needs: python-unit-tests
    runs-on: ubuntu-latest
    # Optional: Parameterize the addressee (though GitHub comments go to the PR/Issue author by default)
    env:
      TARGET_USER: ${{ secrets.NOTIFICATION_USER || github.actor }}

    steps:
      - name: Post Failure Comment
        # Only run if the python-unit-tests job failed
        if: needs.python-unit-tests.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const workflowName = context.workflow;
            const jobName = 'python-unit-tests';
            const runId = context.runId;
            const sha = context.sha;
            const repo = context.repo;
            
            // Construct the message
            const message = `
              ❌ **Workflow Failed!**
              
              *   **Repository:** ${repo.owner}/${repo.repo}
              *   **Workflow:** ${workflowName}
              *   **Job:** ${jobName}
              *   **Status:** FAILED
              *   **Commit:** [\`${sha.substring(0, 7)}\`](${context.payload.pull_request?.html_url || `https://github.com/${repo.owner}/${repo.repo}/commit/${sha}`})
              *   **Run Link:** [View Logs](${context.serverUrl}/${repo.owner}/${repo.repo}/actions/runs/${runId})
              
              @${process.env.TARGET_USER}, please check the logs.
            `;

            try {
              // Try to comment on the Pull Request if it exists
              if (context.payload.pull_request) {
                await github.rest.issues.createComment({
                  owner: repo.owner,
                  repo: repo.repo,
                  issue_number: context.payload.pull_request.number,
                  body: message
                });
                core.info(`Comment posted on PR #${context.payload.pull_request.number}`);
              } else {
                // If no PR, comment on the commit (via the associated issue or just log)
                // Note: GitHub Actions cannot directly "comment" on a commit hash in the UI 
                // unless there is an open PR or Issue. 
                // Fallback: Create an issue if none exists, or just log to console.
                // For this assignment, logging to console is sufficient if no PR exists.
                core.warning("No open Pull Request found. Notification logged to workflow output.");
                core.info(message);
                
                // Optional: Create an issue for the failure if you want persistent tracking
                // await github.rest.issues.create({
                //   owner: repo.owner,
                //   repo: repo.repo,
                //   title: `🚨 Workflow Failure: ${workflowName}`,
                //   body: message
                // });
              }
            } catch (error) {
              core.error(`Failed to post comment: ${error.message}`);
              throw error;
            }

      - name: Post Success Comment (Optional)
        # Only run if the job succeeded (optional, usually we only care about failures)
        if: needs.python-unit-tests.result == 'success'
        run: |
          echo "✅ Tests passed successfully. No failure notification needed."
